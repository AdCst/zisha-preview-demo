name: Deploy main and dev

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for branch switching)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build main + dev
        run: |
          mkdir output

          # === build main ===
          git checkout main
          bundle install
          bundle exec jekyll build -d output

          # === build dev ===
          git checkout dev
          bundle exec jekyll build -d output/dev --baseurl "/dev"

          # === finalize ===
          rm -rf _site
          mv output _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4